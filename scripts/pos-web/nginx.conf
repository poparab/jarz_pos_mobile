server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    include /etc/nginx/mime.types;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        text/css
        text/plain;

    add_header X-Content-Type-Options nosniff always;

    location = /pos/health {
        return 200 'ok';
        add_header Content-Type text/plain always;
        add_header Cache-Control 'no-store, no-cache, must-revalidate, max-age=0' always;
        add_header X-Content-Type-Options nosniff always;
    }

    location = /pos/flutter_service_worker.js {
        try_files $uri =404;
        add_header Cache-Control 'no-store, no-cache, must-revalidate, max-age=0' always;
        add_header Service-Worker-Allowed /pos/ always;
        add_header X-Content-Type-Options nosniff always;
    }

    location ~ ^/pos/(index\.html|flutter_bootstrap\.js|flutter\.js|main\.dart\.js|manifest\.json|version\.json|release-metadata\.json)$ {
        try_files $uri =404;
        add_header Cache-Control 'no-store, no-cache, must-revalidate, max-age=0' always;
        add_header X-Content-Type-Options nosniff always;
    }

    location ~* ^/pos/(assets|canvaskit)/ {
        try_files $uri =404;
        add_header Cache-Control 'public, max-age=86400' always;
        add_header X-Content-Type-Options nosniff always;
    }

    location /pos/ {
        try_files $uri $uri/ /pos/index.html;
        add_header Cache-Control 'no-store, no-cache, must-revalidate, max-age=0' always;
        add_header X-Content-Type-Options nosniff always;
    }
}