name: Firebase App Distribution

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'assets/**'
      - 'lib/**'
      - 'l10n.yaml'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.env.prod'
      - '.env.staging'
      - 'scripts/build_release.bat'
      - 'scripts/build_release.sh'
      - 'tool/release_metadata.dart'
  workflow_dispatch:
    inputs:
      release_notes:
        description: Optional production release notes appended to the generated release metadata
        required: false
        type: string

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.35.1"

concurrency:
  group: firebase-distribution-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  distribute-staging:
    name: Distribute Staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Firebase Android config
        shell: bash
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      - name: Restore Android release keystore
        id: signing
        shell: bash
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          keystore_path="$RUNNER_TEMP/jarz-pos-upload.jks"
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Resolve staging build metadata
        id: meta
        shell: bash
        env:
          SOURCE_EVENT: ${{ github.event_name }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          release_notes_file="$RUNNER_TEMP/staging-release-notes.txt"
          manifest_file="$RUNNER_TEMP/staging-release-metadata.json"

          while IFS='=' read -r key value; do
            case "$key" in
              BUILD_NAME) build_name="$value" ;;
              BUILD_NUMBER) build_number="$value" ;;
              VERSION) version="$value" ;;
              ARTIFACT_NAME) artifact_name="$value" ;;
              ARTIFACT_UPLOAD_NAME) artifact_upload_name="$value" ;;
              METADATA_ARTIFACT_NAME) metadata_artifact_name="$value" ;;
              RELEASE_ID) release_id="$value" ;;
              SHORT_SHA) short_sha="$value" ;;
              GENERATED_AT_UTC) generated_at_utc="$value" ;;
            esac
          done < <(
            dart run tool/release_metadata.dart \
              --channel staging \
              --event "$SOURCE_EVENT" \
              --branch "$SOURCE_BRANCH" \
              --sha "$SOURCE_SHA" \
              --actor "$SOURCE_ACTOR" \
              --run-id "$RUN_ID" \
              --run-number "$RUN_NUMBER" \
              --run-attempt "$RUN_ATTEMPT" \
              --release-notes-file "$release_notes_file" \
              --manifest-file "$manifest_file" \
              --format env
          )

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "artifact_upload_name=$artifact_upload_name" >> "$GITHUB_OUTPUT"
          echo "metadata_artifact_name=$metadata_artifact_name" >> "$GITHUB_OUTPUT"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "generated_at_utc=$generated_at_utc" >> "$GITHUB_OUTPUT"
          echo "release_notes_file=$release_notes_file" >> "$GITHUB_OUTPUT"
          echo "manifest_file=$manifest_file" >> "$GITHUB_OUTPUT"

      - name: Build staging APK
        env:
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ steps.signing.outputs.keystore_path }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --flavor staging \
            --dart-define=ENV=staging \
            --dart-define=SENTRY_ENVIRONMENT=staging \
            --dart-define=SENTRY_RELEASE=${{ steps.meta.outputs.release_id }} \
            --dart-define=SENTRY_DIST=${{ steps.meta.outputs.build_number }} \
            --dart-define-from-file=.env.staging \
            --build-name="${{ steps.meta.outputs.build_name }}" \
            --build-number="${{ steps.meta.outputs.build_number }}"

      - name: Name staging artifact
        id: artifact
        shell: bash
        run: |
          artifact_path="build/app/outputs/flutter-apk/${{ steps.meta.outputs.artifact_name }}"
          cp build/app/outputs/flutter-apk/app-staging-release.apk "$artifact_path"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_upload_name }}
          path: ${{ steps.artifact.outputs.artifact_path }}
          compression-level: 0
          retention-days: 14

      - name: Upload staging metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.metadata_artifact_name }}
          path: |
            ${{ steps.meta.outputs.manifest_file }}
            ${{ steps.meta.outputs.release_notes_file }}
          retention-days: 14

      - name: Register staging Sentry release
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG_SLUG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_FLUTTER }}
          RELEASE_ID: ${{ steps.meta.outputs.release_id }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_ORG" ] || [ -z "$SENTRY_PROJECT" ]; then
            echo "Skipping Sentry release registration; missing Sentry secrets."
            exit 0
          fi

          npm install --global @sentry/cli

          if ! sentry-cli releases info "$RELEASE_ID" >/dev/null 2>&1; then
            sentry-cli releases new -p "$SENTRY_PROJECT" "$RELEASE_ID"
          fi
          sentry-cli releases set-commits "$RELEASE_ID" --auto
          sentry-cli releases finalize "$RELEASE_ID"
          sentry-cli releases deploys "$RELEASE_ID" new -e staging

      - name: Write staging release summary
        shell: bash
        run: |
          {
            echo "## Staging Release"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Release ID | ${{ steps.meta.outputs.release_id }} |"
            echo "| Version | ${{ steps.meta.outputs.version }} |"
            echo "| APK file | ${{ steps.meta.outputs.artifact_name }} |"
            echo "| APK artifact | ${{ steps.meta.outputs.artifact_upload_name }} |"
            echo "| Metadata artifact | ${{ steps.meta.outputs.metadata_artifact_name }} |"
            echo "| Commit | ${{ steps.meta.outputs.short_sha }} |"
            echo "| Generated (UTC) | ${{ steps.meta.outputs.generated_at_utc }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Distribute staging APK
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:91050591321:android:d71f35bd6e626244bd1d48
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          testers: ${{ secrets.FIREBASE_TESTERS_STAGING }}
          file: ${{ steps.artifact.outputs.artifact_path }}
          releaseNotesFile: ${{ steps.meta.outputs.release_notes_file }}

  distribute-production:
    name: Distribute Production
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Require main branch for production release
        if: github.ref_name != 'main'
        shell: bash
        run: |
          echo "Production releases must be triggered from the main branch."
          exit 1

      - name: Restore Firebase Android config
        shell: bash
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      - name: Restore Android release keystore
        id: signing
        shell: bash
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          keystore_path="$RUNNER_TEMP/jarz-pos-upload.jks"
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Resolve production build metadata
        id: meta
        shell: bash
        env:
          SOURCE_EVENT: ${{ github.event_name }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          release_notes_file="$RUNNER_TEMP/production-release-notes.txt"
          manifest_file="$RUNNER_TEMP/production-release-metadata.json"

          while IFS='=' read -r key value; do
            case "$key" in
              BUILD_NAME) build_name="$value" ;;
              BUILD_NUMBER) build_number="$value" ;;
              VERSION) version="$value" ;;
              ARTIFACT_NAME) artifact_name="$value" ;;
              ARTIFACT_UPLOAD_NAME) artifact_upload_name="$value" ;;
              METADATA_ARTIFACT_NAME) metadata_artifact_name="$value" ;;
              RELEASE_ID) release_id="$value" ;;
              SHORT_SHA) short_sha="$value" ;;
              GENERATED_AT_UTC) generated_at_utc="$value" ;;
            esac
          done < <(
            dart run tool/release_metadata.dart \
              --channel production \
              --event "$SOURCE_EVENT" \
              --branch "$SOURCE_BRANCH" \
              --sha "$SOURCE_SHA" \
              --actor "$SOURCE_ACTOR" \
              --run-id "$RUN_ID" \
              --run-number "$RUN_NUMBER" \
              --run-attempt "$RUN_ATTEMPT" \
              --release-notes "$INPUT_RELEASE_NOTES" \
              --release-notes-file "$release_notes_file" \
              --manifest-file "$manifest_file" \
              --format env
          )

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "artifact_upload_name=$artifact_upload_name" >> "$GITHUB_OUTPUT"
          echo "metadata_artifact_name=$metadata_artifact_name" >> "$GITHUB_OUTPUT"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "generated_at_utc=$generated_at_utc" >> "$GITHUB_OUTPUT"
          echo "release_notes_file=$release_notes_file" >> "$GITHUB_OUTPUT"
          echo "manifest_file=$manifest_file" >> "$GITHUB_OUTPUT"

      - name: Build production APK
        env:
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ steps.signing.outputs.keystore_path }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --flavor production \
            --dart-define=ENV=prod \
            --dart-define=SENTRY_ENVIRONMENT=production \
            --dart-define=SENTRY_RELEASE=${{ steps.meta.outputs.release_id }} \
            --dart-define=SENTRY_DIST=${{ steps.meta.outputs.build_number }} \
            --dart-define-from-file=.env.prod \
            --build-name="${{ steps.meta.outputs.build_name }}" \
            --build-number="${{ steps.meta.outputs.build_number }}"

      - name: Name production artifact
        id: artifact
        shell: bash
        run: |
          artifact_path="build/app/outputs/flutter-apk/${{ steps.meta.outputs.artifact_name }}"
          cp build/app/outputs/flutter-apk/app-production-release.apk "$artifact_path"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_upload_name }}
          path: ${{ steps.artifact.outputs.artifact_path }}
          compression-level: 0
          retention-days: 14

      - name: Upload production metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.metadata_artifact_name }}
          path: |
            ${{ steps.meta.outputs.manifest_file }}
            ${{ steps.meta.outputs.release_notes_file }}
          retention-days: 14

      - name: Register production Sentry release
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG_SLUG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_FLUTTER }}
          RELEASE_ID: ${{ steps.meta.outputs.release_id }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_ORG" ] || [ -z "$SENTRY_PROJECT" ]; then
            echo "Skipping Sentry release registration; missing Sentry secrets."
            exit 0
          fi

          npm install --global @sentry/cli

          if ! sentry-cli releases info "$RELEASE_ID" >/dev/null 2>&1; then
            sentry-cli releases new -p "$SENTRY_PROJECT" "$RELEASE_ID"
          fi
          sentry-cli releases set-commits "$RELEASE_ID" --auto
          sentry-cli releases finalize "$RELEASE_ID"
          sentry-cli releases deploys "$RELEASE_ID" new -e production

      - name: Write production release summary
        shell: bash
        run: |
          {
            echo "## Production Release"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Release ID | ${{ steps.meta.outputs.release_id }} |"
            echo "| Version | ${{ steps.meta.outputs.version }} |"
            echo "| APK file | ${{ steps.meta.outputs.artifact_name }} |"
            echo "| APK artifact | ${{ steps.meta.outputs.artifact_upload_name }} |"
            echo "| Metadata artifact | ${{ steps.meta.outputs.metadata_artifact_name }} |"
            echo "| Commit | ${{ steps.meta.outputs.short_sha }} |"
            echo "| Generated (UTC) | ${{ steps.meta.outputs.generated_at_utc }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Distribute production APK
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:91050591321:android:51e8d24563ad8989bd1d48
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          testers: ${{ secrets.FIREBASE_TESTERS_PRODUCTION }}
          file: ${{ steps.artifact.outputs.artifact_path }}
          releaseNotesFile: ${{ steps.meta.outputs.release_notes_file }}