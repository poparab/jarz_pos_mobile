name: Firebase App Distribution

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_name:
        description: Optional semantic version override, for example 1.0.0
        required: false
        type: string
      build_number:
        description: Optional numeric build number override
        required: false
        type: string
      release_notes:
        description: Optional production release notes
        required: false
        type: string

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.35.1"

concurrency:
  group: firebase-distribution-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  distribute-staging:
    name: Distribute Staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source revision
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Firebase Android config
        shell: bash
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      - name: Restore Android release keystore
        id: signing
        shell: bash
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          keystore_path="$RUNNER_TEMP/jarz-pos-upload.jks"
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Resolve staging build metadata
        id: meta
        shell: bash
        env:
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          version_line="$(grep '^version:' pubspec.yaml | head -n 1 | awk '{print $2}')"
          build_name="${version_line%%+*}"
          build_number="${GITHUB_RUN_NUMBER}"
          artifact_name="jarz-pos-staging-v${build_name}+${build_number}.apk"
          release_notes_file="$RUNNER_TEMP/staging-release-notes.txt"
          short_sha="${SOURCE_SHA::7}"

          {
            echo "Channel: staging"
            echo "Environment: staging"
            echo "Version: ${build_name}+${build_number}"
            echo "Source branch: ${SOURCE_BRANCH}"
            echo "Source commit: ${short_sha}"
            echo "Triggered by push to main."
          } > "$release_notes_file"

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "release_notes_file=$release_notes_file" >> "$GITHUB_OUTPUT"

      - name: Build staging APK
        env:
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ steps.signing.outputs.keystore_path }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --flavor staging \
            --dart-define=ENV=staging \
            --dart-define-from-file=.env.staging \
            --build-name="${{ steps.meta.outputs.build_name }}" \
            --build-number="${{ steps.meta.outputs.build_number }}"

      - name: Name staging artifact
        id: artifact
        shell: bash
        run: |
          artifact_path="build/app/outputs/flutter-apk/${{ steps.meta.outputs.artifact_name }}"
          cp build/app/outputs/flutter-apk/app-staging-release.apk "$artifact_path"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-release-apk
          path: ${{ steps.artifact.outputs.artifact_path }}
          retention-days: 14

      - name: Distribute staging APK
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:91050591321:android:d71f35bd6e626244bd1d48
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          testers: ${{ secrets.FIREBASE_TESTERS_STAGING }}
          file: ${{ steps.artifact.outputs.artifact_path }}
          releaseNotesFile: ${{ steps.meta.outputs.release_notes_file }}

  distribute-production:
    name: Distribute Production
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source revision
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Require main branch for production release
        if: github.ref_name != 'main'
        shell: bash
        run: |
          echo "Production releases must be triggered from the main branch."
          exit 1

      - name: Restore Firebase Android config
        shell: bash
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      - name: Restore Android release keystore
        id: signing
        shell: bash
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          keystore_path="$RUNNER_TEMP/jarz-pos-upload.jks"
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Resolve production build metadata
        id: meta
        shell: bash
        env:
          INPUT_BUILD_NAME: ${{ inputs.build_name }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          version_line="$(grep '^version:' pubspec.yaml | head -n 1 | awk '{print $2}')"
          default_build_name="${version_line%%+*}"
          build_name="${INPUT_BUILD_NAME:-$default_build_name}"
          build_number="${INPUT_BUILD_NUMBER:-$GITHUB_RUN_NUMBER}"
          artifact_name="jarz-pos-production-v${build_name}+${build_number}.apk"
          release_notes_file="$RUNNER_TEMP/production-release-notes.txt"

          {
            echo "Channel: production"
            echo "Environment: prod"
            echo "Version: ${build_name}+${build_number}"
            echo "Triggered manually by: ${GITHUB_ACTOR}"
            if [[ -n "$INPUT_RELEASE_NOTES" ]]; then
              echo
              echo "$INPUT_RELEASE_NOTES"
            fi
          } > "$release_notes_file"

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "release_notes_file=$release_notes_file" >> "$GITHUB_OUTPUT"

      - name: Build production APK
        env:
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ steps.signing.outputs.keystore_path }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --flavor production \
            --dart-define=ENV=prod \
            --dart-define-from-file=.env.prod \
            --build-name="${{ steps.meta.outputs.build_name }}" \
            --build-number="${{ steps.meta.outputs.build_number }}"

      - name: Name production artifact
        id: artifact
        shell: bash
        run: |
          artifact_path="build/app/outputs/flutter-apk/${{ steps.meta.outputs.artifact_name }}"
          cp build/app/outputs/flutter-apk/app-production-release.apk "$artifact_path"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-release-apk
          path: ${{ steps.artifact.outputs.artifact_path }}
          retention-days: 14

      - name: Distribute production APK
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:91050591321:android:51e8d24563ad8989bd1d48
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          testers: ${{ secrets.FIREBASE_TESTERS_PRODUCTION }}
          file: ${{ steps.artifact.outputs.artifact_path }}
          releaseNotesFile: ${{ steps.meta.outputs.release_notes_file }}